<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Kelola Resep</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<h1>Kelola Resep</h1>

<div class="tombol-aksi" style="margin-bottom: 20px;">
    <a th:href="@{/admin/resep/tambah}" class="btn btn-pesan">+ Tambah Resep</a>
    <a th:href="@{/admin/dashboard}" class="btn btn-cek">Kembali ke Dashboard</a>
</div>

<div th:each="entry : ${resepPerKue}" class="menu-card" style="flex-direction: column; align-items: flex-start; gap: 6px;">

    <p style="font-weight: bold; font-size: 16px; color: #d35400;" th:text="${entry.key.namaKue}"></p>

    <table class="tabel-data" style="margin-top: 4px;">
        <thead>
            <tr>
                <th>Bahan Baku</th>
                <th>Jumlah Dibutuhkan</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="r : ${entry.value}">
                <td th:text="${r.bahanBaku.namaBahan}"></td>
                <td th:text="${r.jumlahDibutuhkan} + ' ' + ${r.bahanBaku.satuan}"></td>
                <td>
                    <form th:action="@{/admin/resep/hapus/{id}(id=${r.idResep})}" method="post">
                        <button type="submit" class="btn-kecil btn-hapus">Hapus</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
